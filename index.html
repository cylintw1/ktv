<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今嗓 KTV 歌單查詢系統</title>
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #2f3542;
            --background-color: #f1f2f6;
            --card-background: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--secondary-color);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            padding: 20px;
            margin-top: 10px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.85rem;
            color: #747d8c;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dfe4ea;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-search {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: #ced6e0;
            color: var(--secondary-color);
        }

        button:active {
            opacity: 0.8;
        }

        .results-count {
            font-size: 0.9rem;
            color: #747d8c;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .song-card {
            border: 1px solid #eccc68;
            background-color: #fffaf0;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            position: relative;
            overflow: hidden;
        }

        .song-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background-color: #ffa502;
        }

        .song-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2f3542;
        }

        .song-code {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--primary-color);
            background: #ffe8e8;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .song-artist {
            font-size: 0.9rem;
            color: #57606f;
        }

        .song-lyrics {
            font-size: 0.85rem;
            color: #747d8c;
            background: #f1f2f6;
            padding: 8px;
            border-radius: 6px;
            margin-top: 5px;
            font-style: italic;
        }

        .no-result {
            text-align: center;
            color: #a4b0be;
            padding: 30px 10px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎤 今嗓 KTV 歌單查詢 🎤</h1>
        <p>輸入歌名、歌手或歌詞，立即秒查點歌號碼！</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="輸入歌名、歌手或歌詞關鍵字..." autocomplete="off">
        <div class="btn-group">
            <button class="btn-search" onclick="searchSong()">搜尋</button>
            <button class="btn-clear" onclick="clearSearch()">重設</button>
        </div>
    </div>

    <div id="resultsCount" class="results-count" style="display: none;"></div>
    <div id="songList" class="song-list">
        </div>
</div>

<script>
    // 今嗓 KTV 歌單資料庫 (可自行在這裡新增、修改歌曲)
    const KTV_DATABASE = [
        { id: "1001", title: "聽海", artist: "張惠妹", lyrics: "聽海哭的聲音 嘆惜著誰又被傷了心 卻還不清醒" },
        { id: "1002", title: "溫柔", artist: "五月天", lyrics: "走在風中 今天陽光 突然好溫柔 天空悄悄升起彩虹" },
        { id: "1003", title: "刻在我心底的名字", artist: "盧廣仲", lyrics: "刻在我心底的名字 忘記了時間這回事 於是謊言說了一次又一次" },
        { id: "1004", title: "倒帶", artist: "蔡依林", lyrics: "終於看開愛回不來 而你總是太晚明白 最後才把話說開 哭著求我留下來" },
        { id: "1005", title: "愛如潮水", artist: "張信哲", lyrics: "不問你為何流眼淚 不在乎你心裡還有誰 且讓我給你安慰" }
    ];

    // 監聽手機虛擬鍵盤的「確認/搜尋」鍵
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchSong();
            this.blur(); // 隱藏手機鍵盤
        }
    });

    function searchSong() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const songListDiv = document.getElementById('songList');
        const countDiv = document.getElementById('resultsCount');
        
        songListDiv.innerHTML = '';
        
        if (!query) {
            countDiv.style.display = 'none';
            songListDiv.innerHTML = '<div class="no-result">💡 請先輸入關鍵字再進行查詢喔！</div>';
            return;
        }

        // 進行模糊搜尋 (歌名、歌手、歌詞)
        const results = KTV_DATABASE.filter(song => 
            song.title.toLowerCase().includes(query) || 
            song.artist.toLowerCase().includes(query) || 
            song.lyrics.toLowerCase().includes(query)
        );

        if (results.length > 0) {
            countDiv.style.display = 'block';
            countDiv.textContent = `🔍 找到 ${results.length} 首相關歌曲：`;
            
            results.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <div class="song-header">
                        <span class="song-title">${song.title}</span>
                        <span class="song-code">${song.id}</span>
                    </div>
                    <div class="song-artist">🎤 ${song.artist}</div>
                    <div class="song-lyrics">“ ${song.lyrics} ”</div>
                `;
                songListDiv.appendChild(card);
            });
        } else {
            countDiv.style.display = 'none';
            songListDiv.innerHTML = '<div class="no-result">❌ 找不到符合的歌曲，換個關鍵字試試看吧！</div>';
        }
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('songList').innerHTML = '';
        document.getElementById('resultsCount').style.display = 'none';
    }
</script>

</body>
</html>
