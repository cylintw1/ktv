<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>金嗓歌單查詢</title>
<style>
  :root {
    --bg:#151014;
    --panel:#1e171c;
    --gold:#d4a94a;
    --gold-dim:#8a7238;
    --text:#f2ead9;
    --sub:#a99a8f;
    --line:#3a2f30;
    --green:#2ed573;
    --green-dim:#1e8f49;
  }
  *{box-sizing:border-box;}
  body {
    margin:0;
    background:var(--bg);
    background-image:
      radial-gradient(ellipse at 50% -10%, rgba(212,169,74,0.12), transparent 60%);
    color:var(--text);
    font-family: "Noto Serif TC", "PMingLiU", serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header {
    text-align:center;
    padding:36px 20px 24px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow {
    letter-spacing:0.4em;
    font-size:11px;
    color:var(--gold-dim);
    margin-bottom:8px;
  }
  h1 {
    margin:0;
    font-size:28px;
    font-weight:700;
    letter-spacing:0.15em;
    color:var(--gold);
    text-shadow:0 0 18px rgba(212,169,74,0.35);
  }
  .sub {
    color:var(--sub);
    font-size:13px;
    margin-top:10px;
    letter-spacing:0.05em;
  }
  main {
    max-width:520px;
    margin:0 auto;
    padding:24px 18px;
  }
  .search-box {
    position:relative;
    margin-bottom:12px;
  }
  input[type="text"], input[type="number"] {
    width:100%;
    padding:14px 16px;
    font-size:17px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    font-family:inherit;
    outline:none;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color:var(--gold-dim);
    box-shadow:0 0 0 3px rgba(212,169,74,0.12);
  }
  .action-group {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn {
    flex: 1;
    padding: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    background: var(--panel);
    color: var(--sub);
    transition: all 0.2s;
  }
  .btn:active {
    opacity: 0.8;
  }
  .btn-add {
    color: var(--green);
    border-color: var(--green-dim);
  }
  
  /* 手動新增面板 */
  .add-panel {
    background: var(--panel);
    border: 1px dashed var(--gold-dim);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 18px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .add-panel h3 {
    margin: 0;
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .add-panel-row {
    display: flex;
    gap: 8px;
  }
  .add-panel input {
    padding: 10px 12px;
    font-size: 14px;
  }
  .btn-submit {
    background: var(--gold);
    color: var(--bg);
    border: none;
    font-size: 15px;
  }

  .hint {
    font-size:12px;
    color:var(--sub);
    margin:8px 4px 0;
  }
  .count {
    font-size:12px;
    color:var(--gold-dim);
    margin:20px 4px 10px;
    letter-spacing:0.1em;
  }
  ul.results {
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  li.card {
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .num {
    font-family: "Courier New", monospace;
    font-size:20px;
    font-weight:700;
    color:var(--bg);
    background:var(--gold);
    min-width:64px;
    text-align:center;
    padding:6px 4px;
    border-radius:6px;
    letter-spacing:0.02em;
  }
  .meta {
    flex:1;
    min-width:0;
  }
  .title {
    font-size:17px;
    font-weight:700;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .singer {
    font-size:13px;
    color:var(--sub);
    margin-top:3px;
  }
  .period {
    font-size:11px;
    color:var(--gold-dim);
    margin-top:2px;
    letter-spacing:0.05em;
  }
  .empty {
    text-align:center;
    color:var(--sub);
    font-size:14px;
    padding:30px 10px;
    line-height:1.8;
  }

  /* 智慧新分頁搜尋輔助 */
  .online-help-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-top: 15px;
    display: none;
    flex-direction: column;
    gap: 10px;
    text-align: center;
  }
  .online-help-panel p {
    font-size: 13px;
    color: var(--sub);
    line-height: 1.5;
  }
  .link-btn {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    display: block;
    transition: all 0.2s;
  }
  .link-btn:active {
    background: rgba(212,169,74,0.1);
  }

  footer {
    text-align:center;
    color:var(--sub);
    font-size:11px;
    padding:30px 20px 10px;
    letter-spacing:0.05em;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">台語 · 新歌速遞</div>
  <h1>金 嗓 歌 單</h1>
  <div class="sub">輸入歌名或歌號查詢</div>
</header>

<main>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="例如：命運 或 60218" autocomplete="off" inputmode="search">
    <div class="action-group">
      <button class="btn" onclick="clearSearch()">清除重設</button>
      <button class="btn btn-add" onclick="toggleAddPanel()">＋ 擴充號碼</button>
    </div>
  </div>

  <div id="addPanel" class="add-panel">
    <h3>＋ 新增專屬點歌號碼</h3>
    <div class="add-panel-row">
      <input type="number" id="newNum" placeholder="歌號 (例如: 88888)" pattern="[0-9]*" inputmode="numeric">
      <input type="text" id="newTitle" placeholder="歌名">
    </div>
    <div class="add-panel-row">
      <input type="text" id="newSinger" placeholder="歌手">
      <input type="text" id="newPeriod" placeholder="期別 (例如: 115-08)">
    </div>
    <button class="btn btn-submit" onclick="saveNewSong()">儲存至本機歌單</button>
  </div>

  <div class="hint">目前收錄「新歌速遞」共 <span id="totalCount"></span> 首（已包含本機新增）</div>

  <div class="count" id="resultCount"></div>
  <ul class="results" id="results"></ul>

  <div id="onlineHelpPanel" class="online-help-panel">
    <p>💡 本地歌單暫無此曲。<br>已為您準備好關鍵字，點擊下方按鈕將在<b>新分頁</b>搜尋，此畫面不會消失：</p>
    <a id="btnGoogle" class="link-btn" target="_blank" rel="noopener noreferrer" href="#">🌐 在新分頁 Google 搜尋代碼</a>
  </div>
</main>

<footer>資料整理自台灣點歌王 · 僅供個人點歌參考</footer>

<script>
